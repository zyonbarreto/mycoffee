<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#2E2017" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <title>MyCoffee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { color-scheme: light; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Archivo', sans-serif;
      background: #E7E0D7;
      display: flex; align-items: flex-start; justify-content: center;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }
    @keyframes mc-slideup { from { transform: translateY(28px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes mc-fade { from { opacity: 0; } to { opacity: 1; } }
    @keyframes mc-pulse { 0% { transform: translate(-50%,-50%) scale(0.6); opacity: 0.7; } 100% { transform: translate(-50%,-50%) scale(1.85); opacity: 0; } }
    @keyframes mc-spin { to { transform: rotate(360deg); } }
    .mc-scroll::-webkit-scrollbar { display: none; }
    .mc-scroll { scrollbar-width: none; }
    .mc-in::placeholder { color: #B09877; }
    button { font-family: 'Archivo', sans-serif; }

    /* On real phones, fill the screen. The 390x844 frame is for desktop preview. */
    #frame {
      width: 390px; height: 844px; background: #F6F0E8; border-radius: 46px;
      position: relative; overflow: hidden;
      box-shadow: 0 40px 80px -20px rgba(58,38,22,0.45), 0 0 0 1px rgba(58,38,22,0.06);
      border: 8px solid #221710;
    }
    @media (max-width: 480px) {
      body { background: #F6F0E8; }
      #frame {
        width: 100vw; height: 100dvh; border-radius: 0; border: none; box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div id="frame"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
